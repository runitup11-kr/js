<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>3의 배수 찾기</h1>

<script>
    let count = 0
    let number = parseInt(prompt('몇 까지의 3의 배수를 찾을까요'));

    for(let i = 1; i <= number ; i++){
        if(i % 3 === 0){
            count++;
            
            document.write(i + (i + 3 > number ? "" : ","));
            
        }  
        
    }
    document.write("<br><br>");
    document.write(`<strong>${number}까지 3의 배수의 개수: ${count}개</strong>`);

</script>
    
</body>
</html>
