<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <h1>자리배치도</h1>
<body>


<script>
    let memNum = parseInt(prompt('입장객은 몇 명인가요'));
    let colNum = parseInt(prompt('한 줄에 몇 명씩 앉습니까'));

    if(memNum % colNum === 0){
        rowNum = memNum / colNum;
    }
    else{
        rowNum = parseInt(memNum/colNum) + 1;

    }
    //document.write(`모두${rowNum}개의 줄이 필요합니다`);
    for(let i = 0; i < rowNum ; i ++){ // 행
        for(let j = 1; j <= colNum ; j ++){ // 열
            seatNo = i * colNum + j;
            if(seatNo > memNum) break;
            document.write(`좌석 ${seatNo}`);

        }
        document.write(`<br>`);
    }
</script>


</body>
</html>
